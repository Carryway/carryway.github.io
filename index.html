<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="text/javascript" charset="utf-8" async="" src="//ssl.p.jwpcdn.com/player/v/8.22.0/jwpsrv.js"></script>
    <script type="text/javascript">
        document.oncontextmenu = function () { return false }
    </script>

    <style>
        /* Mengatur base agar memenuhi layar penuh tanpa scrollbar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Background hitam khas video player */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Container utama agar video tetap proporsional 16:9 dan responsive */
        .ViostreamIframe {
            position: relative;
            width: 100%;
            max-width: 100%;
            height: 0;
            padding-top: 56.25%; /* Aspek rasio 16:9 */
        }

        .ViostreamIframe iframe {
            border: 0;
            height: 100%;
            left: 0;
            position: absolute;
            top: 0;
            width: 100%;
        }

        /* Elemen tersembunyi awal jika diperlukan */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <iframe id="videoIframe" class="hidden" allowfullscreen sandbox="allow-same-origin allow-scripts" style="border:0; width:100%; height:100%; position:absolute; top:0; left:0;"></iframe>

    <div id="player" aria-label="Video Player" role="application" style="width: 100%;">
        <div class="afs_ads ad-placement" style="width: 1px; height: 1px; position: absolute; background: transparent;">
            &nbsp;</div>
    </div>

    <script type="text/javascript">
        window.onload = function () {
            var urlParams = new URLSearchParams(window.location.search);
            var iframeSrc = urlParams.get("id");
            var videoUrl = iframeSrc; // Mengaitkan videoUrl dengan parameter id

            if (iframeSrc) {
                var iframe = document.createElement("iframe");
                iframe.src = iframeSrc;
                iframe.frameBorder = "0";
                iframe.allowFullscreen = true;
                iframe.sandbox = "allow-same-origin allow-scripts";

                var iframeContainer = document.createElement("div");
                iframeContainer.className = "ViostreamIframe";
                iframeContainer.appendChild(iframe);

                document.body.appendChild(iframeContainer);
            }
            else if (typeof videoUrl !== 'undefined' && videoUrl) {
                // Tampilkan Iframe untuk selain M3U8
                var fallbackIframe = document.getElementById('videoIframe');
                fallbackIframe.classList.remove('hidden');

                // Memasukkan iframe bawaan ke dalam container responsive secara dinamis
                var iframeContainer = document.createElement("div");
                iframeContainer.className = "ViostreamIframe";
                fallbackIframe.parentNode.insertBefore(iframeContainer, fallbackIframe);
                iframeContainer.appendChild(fallbackIframe);

                // Daftar domain yang dikecualikan dari sandbox
                const excludedDomains = ['voodc.com', 'www.vidembed.re', 'streamtp3.com', 'topembed.pw'];

                // Buat link element untuk mendapatkan hostname dari URL
                const link = document.createElement('a');
                link.href = videoUrl;

                // Periksa apakah URL termasuk domain yang dikecualikan
                if (excludedDomains.includes(link.hostname)) {
                    fallbackIframe.removeAttribute('sandbox');
                } else {
                    fallbackIframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-top-navigation');
                }

                fallbackIframe.src = videoUrl;
            }
        };
    </script>

    <script>
        function toggleFullscreen() {
            let elem = document.querySelector("iframe");

            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch((err) => {
                    alert(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>

</html>
